<style>
  #lang-toggle-btn {
    position: fixed;
    bottom: 32px;
    right: 32px;
    z-index: 9999;
    background: #2c3e50;
    color: #fff;
    border: none;
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    transition: background 0.2s, transform 0.1s;
  }
  #lang-toggle-btn:hover {
    background: #1a252f;
    transform: translateY(-2px);
  }
  .lang-zh { display: none; }
</style>

<button id="lang-toggle-btn">中文</button>

<script>
(function () {
  var currentLang = localStorage.getItem('preferred-lang') || 'en';
  var btn = document.getElementById('lang-toggle-btn');

  var nameEN = 'Edward Ge';
  var nameZH = '葛智健';

  function applyLang(lang) {
    // 用 'block' 而不是 '' 确保覆盖 CSS 的 display:none
    document.querySelectorAll('.lang-en').forEach(function (el) {
      el.style.display = lang === 'en' ? 'block' : 'none';
    });
    document.querySelectorAll('.lang-zh').forEach(function (el) {
      el.style.display = lang === 'zh' ? 'block' : 'none';
    });

    // 切换名字
    var nameEl = document.querySelector('.quarto-about-jolla h1');
    if (nameEl) nameEl.textContent = lang === 'en' ? nameEN : nameZH;

    btn.textContent = lang === 'en' ? '中文' : 'EN';
    localStorage.setItem('preferred-lang', lang);
    currentLang = lang;
  }

  btn.addEventListener('click', function () {
    applyLang(currentLang === 'en' ? 'zh' : 'en');
  });

  // 直接调用，不用 DOMContentLoaded（脚本在 body 末尾，DOM 已就绪）
  applyLang(currentLang);
})();
</script>
